<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Query System — Order to Cash</title>
    <meta name="description" content="Natural language query system for business data with interactive graph visualization">
    <link rel="stylesheet" href="style.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/webcola@3.4.0/WebCola/cola.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-cola@2.5.1/cytoscape-cola.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
                <div class="header-title">Mapping / <strong>Order to Cash</strong></div>
                <span class="db-badge badge-sqlite" id="dbModeBadge">Local DB</span>
            </div>
            <div class="header-right">
                <button class="btn-icon" id="btnDarkMode" title="Toggle Theme">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button class="btn-icon" id="btnToggleChat" title="Toggle Chat Panel">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="15" y1="3" x2="15" y2="21"></line></svg>
                </button>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Panel: Graph -->
            <div class="graph-panel">
                <!-- Top-left controls -->
                <div class="floating-buttons">
                    <button class="btn-float btn-white" id="btnMinimize">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                        Minimize
                    </button>
                    <button class="btn-float btn-black" id="btnOverlay">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                        Hide Granular Overlay
                    </button>
                    <button class="btn-float btn-white" id="btnNodeIds">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                        Toggle Node IDs
                    </button>
                </div>

                <!-- Graph Search -->
                <div class="graph-search-wrapper">
                    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="graphSearch" class="graph-search" placeholder="Search nodes..." autocomplete="off" />
                </div>

                <!-- Zoom Controls -->
                <div class="zoom-controls">
                    <button class="zoom-btn" id="btnZoomIn" title="Zoom In">+</button>
                    <button class="zoom-btn" id="btnZoomOut" title="Zoom Out">−</button>
                    <button class="zoom-btn zoom-btn-text" id="btnZoomReset" title="Fit to View">⊡</button>
                </div>

                <!-- Graph Stats -->
                <div class="graph-stats-pill" id="graphStatsContainer">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="5" r="2"/><circle cx="19" cy="12" r="2"/><circle cx="5" cy="12" r="2"/><circle cx="12" cy="19" r="2"/><line x1="12" y1="7" x2="12" y2="9"/><line x1="15" y1="12" x2="17" y2="12"/><line x1="7" y1="12" x2="9" y2="12"/><line x1="12" y1="15" x2="12" y2="17"/></svg>
                    <span id="graphStats">0 nodes · 0 edges</span>
                </div>

                <!-- Loading Skeleton -->
                <div class="graph-skeleton" id="graphSkeleton">
                    <div class="skeleton-pulse"></div>
                    <span>Loading graph data...</span>
                </div>

                <div id="cy" class="graph-container"></div>
                
                <!-- Legend -->
                <div class="graph-legend" id="graphLegend"></div>

                <!-- Node Details Tooltip -->
                <div class="node-details" id="nodeDetails">
                    <div class="node-details-header">
                        <h3 id="nodeLabel">Journal Entry</h3>
                    </div>
                    <div class="node-details-props" id="nodeProps"></div>
                </div>
            </div>

            <!-- Right Panel: Chat -->
            <div class="chat-panel">
                <div class="chat-header">
                    <h2>Chat with Graph</h2>
                    <p>Order to Cash</p>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <div class="message system-message">
                        <div class="system-header">
                            <div class="avatar-ai">D</div>
                            <div class="ai-name">Dodge AI <span>Graph Agent</span></div>
                        </div>
                        <div class="message-content">
                            <p>Hi! I can help you analyze the <strong>Order to Cash</strong> process.</p>
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <!-- Quick Query Chips -->
                    <div class="quick-chips-row">
                        <button class="quick-chip" data-query="What are my top customers by revenue?">💰 Top customers</button>
                        <button class="quick-chip" data-query="Show me all broken orders missing delivery statuses">⚠️ Broken orders</button>
                        <button class="quick-chip" data-query="Trace the flow for the latest order">🔍 Trace order</button>
                        <button class="quick-chip" data-query="Show summary statistics">📊 Summary stats</button>
                    </div>

                    <div class="status-bar">
                        <div class="status-dot"></div>
                        <div class="status-text">Dodge AI is awaiting instructions</div>
                    </div>
                    <form id="chatForm">
                        <div class="input-wrapper">
                            <textarea id="chatInput" placeholder="Analyze anything" rows="1"></textarea>
                            <button type="submit" class="btn-send" id="btnSend">Send</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js?v=4"></script>
</body>
</html>
